# ║  █▄▄ █▀█  █  █▀▀ █▀▀ █▄█ █▄▄ █▄▄ █ █ ▀█                                    ║
# ║  ─────────────────────────────────────────────────────────────────────────   ║
# ║  MOCHA VARIANT // Based on catppuccin/catppuccin                            ║
# ║  "Soothing pastel theme for the high-spirited!"                             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# DESIGN PHILOSOPHY:
# - Warm, soothing pastels on a deep base
# - Balanced accent colors with excellent readability
# - Inspired by the Catppuccin community palette
#
# REQUIRES: Nerd Font v3.0+ (FiraCode Nerd Font, JetBrains Mono Nerd Font, etc.)

"$schema" = 'https://starship.rs/config-schema.json'

# ══════════════════════════════════════════════════════════════════════════════
# PALETTE - Catppuccin Mocha
# ══════════════════════════════════════════════════════════════════════════════

# Palette is managed by distromac-theme-set (merged from themed template)
palette = "distromac"

# ══════════════════════════════════════════════════════════════════════════════
# PROMPT ARCHITECTURE
# ══════════════════════════════════════════════════════════════════════════════

format = """
[┌─](dark3)\
$directory\
[─](dark3)\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
[─](dark3)\
$fill\
$cmd_duration\
[─┐](dark3)\
$line_break\
[└─](dark3)\
$jobs\
$status\
[─](dark3)\
$character"""

right_format = ""

# Continuation prompt
continuation_prompt = "[│ ](dark3)[∵](blue) "

# ══════════════════════════════════════════════════════════════════════════════
# CORE INTERFACE
# ══════════════════════════════════════════════════════════════════════════════

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[◀](bold cyan)"
vimcmd_replace_one_symbol = "[◁](bold orange)"
vimcmd_replace_symbol = "[◁](bold orange)"
vimcmd_visual_symbol = "[◀](bold blue)"

[username]
disabled = true

[hostname]
disabled = true

[directory]
format = "[\\[](dark3)[λ](cyan)[:](dark3)[$read_only]($read_only_style)[$path](bold blue)[\\]](dark3)"
style = "bold blue"
read_only = "󰌾"
read_only_style = "red"
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"
use_os_path_sep = true

[directory.substitutions]

# ══════════════════════════════════════════════════════════════════════════════
# VERSION CONTROL
# ══════════════════════════════════════════════════════════════════════════════

[git_branch]
format = "[\\[](dark3)[±](magenta)[:](dark3)[$branch(:$remote_branch)](magenta)[\\]](dark3)"
symbol = ""
style = "magenta"
truncation_length = 20
truncation_symbol = "…"
only_attached = false

[git_commit]
format = '[⟨$hash$tag⟩](comment)'
style = "comment"
commit_hash_length = 7
tag_symbol = "󰓹"
only_detached = true
tag_disabled = false

[git_state]
format = '[\[](dark3)[$state($progress_current/$progress_total)](bold yellow)[\]](dark3)'
style = "bold yellow"
rebase = "󰳖REB"
merge = "󰘭MRG"
revert = "󰕌REV"
cherry_pick = "CHR"
bisect = "BIS"
am = "AM"
am_or_rebase = "AM/R"

[git_metrics]
format = '([+$added]($added_style))([-$deleted]($deleted_style))'
added_style = "green"
deleted_style = "red"
disabled = false
only_nonzero_diffs = true

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "purple"
conflicted = "󰞇"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕${ahead_count}↕${behind_count}"
up_to_date = ""
untracked = "?"
stashed = "󰏗"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# ══════════════════════════════════════════════════════════════════════════════
# UTILITIES
# ══════════════════════════════════════════════════════════════════════════════

[cmd_duration]
format = "[\\[](dark3)[⚡](yellow)[:](dark3)[$duration](yellow)[\\]](dark3)"
style = "yellow"
min_time = 2_000
show_milliseconds = false

[fill]
symbol = "─"
style = "dark3"

[jobs]
format = "[\\[](dark3)[󰜎](purple)[:](dark3)[$number](purple)[\\]](dark3)"
symbol = ""
style = "purple"
number_threshold = 1
symbol_threshold = 1

[status]
format = '[[\[](dark3)[✘](red)[:](dark3)[$status](red)[\]](dark3)]($style)'
symbol = ""
success_symbol = ""
not_executable_symbol = "󰂭"
not_found_symbol = "󰍉"
sigint_symbol = "󰂭"
signal_symbol = "󱐋"
style = "red"
map_symbol = true
recognize_signal_code = true
disabled = false

# ══════════════════════════════════════════════════════════════════════════════
