# ══════════════════════════════════════════════════════════════════════════════

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[terraform]
disabled = true

[nix_shell]
disabled = true

[conda]
disabled = true

[package]
disabled = true

[os]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[shlvl]
disabled = true

[sudo]
disabled = true

[container]
disabled = true

[time]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[ruby]
disabled = true

[java]
disabled = true

[kotlin]
disabled = true

[swift]
disabled = true

[elixir]
