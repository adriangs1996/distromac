name: Bug Report
description: Report a bug with distromac
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below.
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "e.g. macOS Sequoia 15.3"
    validations:
      required: true
  - type: input
    id: distromac-version
    attributes:
      label: distromac Version
      description: Run `distromac-version` to find this
      placeholder: "e.g. v0.1.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `distromac-theme-set nord`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, etc.
